{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ scene.anime.name }}</title>
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<a href="/" class="back-link">← Back</a>

<div class="container-scene">

    <div class="glass-card">

        <div class="header">
            <div class="anime-title">{{ scene.anime.name }}</div>
            <div class="episode">Episode {{ scene.episode }}</div>

            {% if scene.title %}
                <div class="scene-title">{{ scene.title }}</div>
            {% endif %}
        </div>

        <div class="media">
            <img src="{{ scene.image.url }}" class="scene-image">
        </div>

        <div class="grid">

            <div class="block">
                <div class="label">DESCRIPTION</div>
                <div class="text">{{ scene.description }}</div>
            </div>

            <div class="block">
                <div class="label">KEYWORDS</div>
                <div class="text subtle">{{ scene.keywords }}</div>
            </div>

            <div class="block full">
                <div class="label">TAGS</div>

                <div class="tags">
                    {% for tag in scene.tags %}
                        <span class="tag">{{ tag }}</span>
                    {% endfor %}
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
